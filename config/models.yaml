# Per-stage model selection. Editable without touching code.
#
# Cheap stages use a small Gemini Flash variant (great at structured JSON
# output, ~$0.10/M tokens, free or near-free at our daily volume). The
# writer stages use the best LLM we can afford — the listener actually
# hears the writer's output.
#
# Run dan/scripts/list_models.py (or hit https://openrouter.ai/models) to
# see current availability and pricing.

rank:            google/gemini-2.5-flash-lite
summarize:       google/gemini-2.5-flash-lite
# Writer runs on Sonnet rather than Haiku because the listener actually
# hears this stage. Haiku undershoots length targets (~700 spoken words
# against a 1200-word prompt); Sonnet tracks the per-segment word counts
# in the writer prompt reliably. ~5x cost on these two stages but the
# absolute spend is still pennies per run.
write_draft:     anthropic/claude-sonnet-4.6
write_critique:  anthropic/claude-sonnet-4.6
sanity_extract:  google/gemini-2.5-flash-lite
sanity_verify:   google/gemini-2.5-flash-lite
describe:        google/gemini-2.5-flash-lite
